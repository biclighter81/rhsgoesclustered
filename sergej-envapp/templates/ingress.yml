apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ .Release.Name }}-ingress
  namespace: {{ .Release.Namespace }}
spec:
    rules:
      - host: {{ .Values.ingress.host }}.{{ .Release.Name }}.{{ .Values.ingress.domain }}
        http:
            paths:
            - path: /
              pathType: Prefix
              backend:
                service:
                  name: {{ .Release.Name }}-service
                  port:
                    number: 3000
